<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>

        <section>
            <div class = "infos">

                <div class="info">
                    <h3>High Score:
                        <span id = "high-score">0</span>
                    </h3>
                </div>
    
                <div class="info">
                    <h3>Score :
                        <span id ="score">0</span>
                    </h3>
                </div>
    
                <div class="info">
                    <h3>
                        Time :
                        <span id = "time">00:00:00</span>
                    </h3>
                </div>
    
            </div>

            <div class = "board">
            </div>

        </section>
       <div class="modal">

            <div class="start-game">
                <h3>🐍 Snake  Adventure</h3>
                <h2>Collect food, grow longer, and survive as long as you can!</h2>
                <button class="btn btn-start">Start Adventure</button>
            </div>

            <div class="restart-game">
                <h2>💀 Game Over</h2>
                <h2>You survived as long as you could. Can you beat your previous run?</h2>
                <button class="btn btn-restart">Play Again</button>
            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
